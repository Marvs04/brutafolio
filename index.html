<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Marvin Moncada — Junior Developer · Costa Rica</title>
    <meta name="description" content="Portfolio of Marvin Moncada — Junior Developer based in Costa Rica. Multi-role platforms, data pipelines, and high-performance sites built within real budgets and timelines." />

    <meta name="theme-color" content="#1D1D1F" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:title" content="Marvin Moncada — Junior Developer · Costa Rica" />
    <meta property="og:description" content="Interactive engineering portfolio. Set constraints — team size, budget, scale — and watch architecture decisions update in real time." />
    <meta property="og:image" content="/portfolio-portrait.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="/portfolio-portrait.png" />

    <!-- LCP image preload — tells browser to fetch the hero portrait at highest priority -->
    <link rel="preload" as="image" href="/portfolio-portrait.png" fetchpriority="high" />

    <!-- Favicon (inline SVG — no extra file needed) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231D1D1F'/><text x='6' y='22' font-family='monospace' font-size='18' font-weight='bold' fill='%23007AFF'>M</text></svg>" type="image/svg+xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Async font load — moves Google Fonts off the critical render path -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" /></noscript>
